<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enkel – Kafé</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f6f1ea;
  color: #1a1a1a;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

h1 {
  font-size: 3rem;
  margin: 0;
}

p {
  color: #666;
  line-height: 1.6;
}

.actions {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 20px;
  border-radius: 999px;
  font-weight: 600;
  text-decoration: none;
}

.primary {
  background: black;
  color: white;
}

.secondary {
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Ei lun kaféoppleving</h1>
    <p>En enkel nettside som gir kunden det viktigste raskt: hva du tilbyr og hvordan de tar kontakt.</p>

    <div class="actions">
      <a class="btn primary" href="#">Bestill bord</a>
      <a class="btn secondary" href="./netrivo-mobil-enkel.html?view=mobile">Se mobilversjon</a>
    </div>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const forceView = params.get("view");
  const isMobile = window.innerWidth <= 768;

  if (forceView !== "desktop" && isMobile) {
    window.location.href = "./netrivo-mobil-enkel.html";
  }
})();
</script>

</body>
</html>
