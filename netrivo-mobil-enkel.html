<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobil Enkel</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #faf5ee;
  color: #1a1a1a;
}

.wrap {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

h1 {
  font-size: 2.2rem;
  margin: 0;
}

p {
  color: #666;
  line-height: 1.6;
}

.actions {
  margin-top: 16px;
  display: grid;
  gap: 10px;
}

.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  font-weight: 600;
  text-decoration: none;
}

.primary {
  background: black;
  color: white;
}

.secondary {
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">
    <h1>Rask mobiloppleving</h1>
    <p>Optimalisert for mobil: korte tekster, tydelige knapper og rask handling.</p>

    <div class="actions">
      <a class="btn primary" href="#">Kontakt</a>
      <a class="btn secondary" href="./netrivo-enkel-1-kafe.html?view=desktop">Se full versjon</a>
    </div>
  </div>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const forceView = params.get("view");
  const isDesktop = window.innerWidth > 768;

  if (forceView !== "mobile" && isDesktop) {
    window.location.href = "./netrivo-enkel-1-kafe.html";
  }
})();
</script>

</body>
</html>
