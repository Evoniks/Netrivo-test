<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f4f5f7;
}

.wrap {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 16px;
}

h1 {
  font-size: 2.2rem;
  margin: 0;
}

p {
  color: #666;
}

.btn {
  display: block;
  text-align: center;
  padding: 14px;
  border-radius: 999px;
  margin-top: 10px;
  text-decoration: none;
}

.primary {
  background: black;
  color: white;
}

.secondary {
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h1>Profesjonell og tydelig.</h1>
    <p>Denne mobilversjonen er laget for rådgivere og fagmiljøer som trenger struktur og klarhet.</p>

    <a class="btn primary" href="#">Kontakt</a>
    <a class="btn secondary" href="./netrivo-standard-1-arkitekt.html?view=desktop">Full versjon</a>
  </div>

  <div class="card">
    <strong>Tydelig struktur</strong>
    <p>Enkel navigasjon og rask forståelse.</p>
  </div>

  <div class="card">
    <strong>Høyere nivå</strong>
    <p>Mer profesjonelt enn enkel.</p>
  </div>

</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const forceView = params.get("view");
  const isDesktop = window.innerWidth > 768;

  if (forceView !== "mobile" && isDesktop) {
    window.location.href = "./netrivo-standard-1-arkitekt.html";
  }
})();
</script>

</body>
</html>
